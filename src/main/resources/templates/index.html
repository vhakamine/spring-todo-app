<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Todo</title>
    <meta name="description" content="A functional and beautiful Todo application built with Spring Boot.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1>My Tasks</h1>
            <p class="subtitle">Stay organized, stay focused.</p>
        </header>

        <section class="todo-input-section">
            <form th:action="@{/add}" method="post" class="add-todo-form">
                <input type="text" id="todo-input" name="title" placeholder="What needs to be done?" required autocomplete="off" />
                <button type="submit" class="btn-primary" aria-label="Add Todo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
        </section>

        <section class="todo-list-section">
            <ul class="todo-list" th:if="${todos != null and !todos.isEmpty()}">
                <li th:each="todo : ${todos}" th:classappend="${todo.completed} ? 'completed' : ''" class="todo-item">
                    <div class="todo-content">
                        <form th:action="@{/toggle/{id}(id=${todo.id})}" method="post" class="toggle-form">
                            <button type="submit" class="toggle-btn" aria-label="Toggle Completion">
                                <div class="checkbox">
                                    <svg th:if="${todo.completed}" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="20 6 9 17 4 12"></polyline>
                                    </svg>
                                </div>
                            </button>
                        </form>
                        <span class="todo-text" th:text="${todo.title}">Todo Item Title</span>
                    </div>
                    
                    <form th:action="@{/delete/{id}(id=${todo.id})}" method="post" class="delete-form">
                        <button type="submit" class="btn-danger" aria-label="Delete Todo">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2M10 11v6M14 11v6"></path>
                            </svg>
                        </button>
                    </form>
                </li>
            </ul>
            <div th:if="${todos == null or todos.isEmpty()}" class="empty-state">
                <div class="empty-icon">🌤️</div>
                <p>All caught up!</p>
            </div>
        </section>
    </div>
</body>
</html>
